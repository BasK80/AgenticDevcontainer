http_port 3128

acl allowed   dstdomain "/policy/allowlist.acl"
acl SSL_ports port 443
acl CONNECT   method CONNECT
acl loopback  src 127.0.0.1/32 ::1

# Firewall-aware denials: serve a plain-text page that explains the allowlist
# instead of a bare "access denied". error_directory points at a dir assembled
# in the Dockerfile (stock English templates + our ERR_FIREWALL_BLOCKED page).
error_directory /etc/squid/errors
# Keyed to the last ACL ("all") of the default-deny rule below, so it fires for
# off-allowlist domains but not for the CONNECT-to-non-SSL-port denial above.
deny_info ERR_FIREWALL_BLOCKED all

http_access deny CONNECT !SSL_ports
http_access allow allowed
http_access deny all

logformat egress %tl %>a %Ss/%03>Hs %rm %ru
access_log /var/log/squid/access.log egress !loopback
cache deny all
