# firewall-side DNS resolver
#
# Lets the internal (default-deny) development container resolve external
# hostnames so tools that pre-resolve DNS — e.g. the Copilot CLI web_fetch
# URL-safety guard — don't fail with EAI_AGAIN. Egress is STILL enforced by
# Squid on the actual connection; this only answers name lookups.
no-resolv                       # ignore the firewall's own /etc/resolv.conf
server=1.1.1.1                  # upstream resolvers (reachable via egress)
server=8.8.8.8
listen-address=127.0.0.1,172.28.0.2
bind-dynamic                    # tolerate the per-project FIREWALL_IP (set at runtime by entrypoint.sh)
no-hosts                        # don't serve /etc/hosts entries
cache-size=1000
